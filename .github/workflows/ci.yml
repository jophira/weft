name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      full_matrix:
        description: Run the full cross-OS matrix (including macOS)
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.ref || github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint-action manages its own cache

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: test (${{ matrix.os }})
    # Cross-OS matrix is the portability gate: weft resolves home/config dirs and
    # writes paths into instruction files, so the suite must pass on every OS.
    # The Docker-backed integration tests (Gitea/MCP) stay in the separate
    # `make test-integration` target — GitHub's macOS/Windows runners have no
    # Linux-container Docker. All projection/write-back e2e tests are untagged
    # and run here on every OS.
    #
    # macOS is omitted from pull-request runs to stay inside the free Actions
    # allowance. On a private repo GitHub bills macOS at 10x and Windows at 2x, so
    # the three-OS matrix costs 13 billable minutes per wall-clock minute and a
    # normal PR day exhausts the 2,000-minute monthly grant.
    #
    # Windows is kept on every PR deliberately: it is where this codebase's
    # portability bugs actually surface (HOME/USERPROFILE resolution and
    # "/"-separator assumptions — see #120, #138). macOS has never caught a
    # failure Windows did not, so it gates merges to main rather than every push.
    # Force it early on a risky branch with: gh workflow run ci.yml --ref <branch>
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request'
                && fromJSON('["ubuntu-latest", "windows-latest"]')
                || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run tests
        # Force bash on all OSes: the Windows runner's default PowerShell mangles
        # the `-coverprofile=coverage.out ./...` arguments. Git Bash ships on the
        # windows-latest image and parses the command identically to ubuntu/macOS.
        shell: bash
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run CLI e2e tests
        # Black-box lifecycle test: builds the binary and drives it against an
        # isolated $HOME. Kept in its own tagged package so it doesn't slow the
        # unit run, but exercised on every OS because it depends on home/config
        # dir resolution — the exact thing the cross-OS matrix guards.
        shell: bash
        run: go test -tags e2e ./test/e2e/...

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

  vuln:
    name: vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
