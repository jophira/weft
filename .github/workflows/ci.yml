name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.ref || github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint-action manages its own cache

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: test (${{ matrix.os }})
    # Cross-OS matrix is the portability gate: weft resolves home/config dirs and
    # writes paths into instruction files, so the suite must pass on every OS.
    # The Docker-backed integration tests (Gitea/MCP) stay in the separate
    # `make test-integration` target — GitHub's macOS/Windows runners have no
    # Linux-container Docker. All projection/write-back e2e tests are untagged
    # and run here on every OS.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # ubuntu + macOS are the blocking gate. Windows runs for visibility but is
    # non-blocking until the pre-existing Windows portability debt is cleared
    # (HOME/USERPROFILE resolution, "/"-separator assumptions in tests and a few
    # production paths, Unix abs-path test fixtures). Tracked in #138.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

  vuln:
    name: vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
