name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.ref || github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint-action manages its own cache

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: test (${{ matrix.os }})
    # Cross-OS matrix is the portability gate: weft resolves home/config dirs and
    # writes paths into instruction files, so the suite must pass on every OS.
    # The Docker-backed integration tests (Gitea/MCP) stay in the separate
    # `make test-integration` target — GitHub's macOS/Windows runners have no
    # Linux-container Docker. All projection/write-back e2e tests are untagged
    # and run here on every OS.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # All three OSes are blocking. The Windows portability debt (HOME/USERPROFILE
    # resolution, "/"-separator assumptions in tests and a few production paths,
    # Unix abs-path test fixtures) was cleared in #138.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run tests
        # Force bash on all OSes: the Windows runner's default PowerShell mangles
        # the `-coverprofile=coverage.out ./...` arguments. Git Bash ships on the
        # windows-latest image and parses the command identically to ubuntu/macOS.
        shell: bash
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run CLI e2e tests
        # Black-box lifecycle test: builds the binary and drives it against an
        # isolated $HOME. Kept in its own tagged package so it doesn't slow the
        # unit run, but exercised on every OS because it depends on home/config
        # dir resolution — the exact thing the cross-OS matrix guards.
        shell: bash
        # -count=1 defeats the test cache, and is load-bearing here rather than
        # belt-and-braces. These tests build the weft binary and drive it via
        # exec, so Go's cache key covers the test sources and their imports but
        # cannot see through the subprocess. A change to internal/ leaves those
        # direct inputs untouched, so a restored cache reports a stale `ok` for
        # the exact class of change this suite exists to catch. Observed for real
        # on the #219 Windows job, which reported `ok (cached)` for a package
        # that had failed on the previous commit.
        run: go test -tags e2e -count=1 ./test/e2e/...

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

  vuln:
    name: vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
