root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/weft"
cmd = "go build -o ./tmp/weft ."
delay = 500
exclude_dir = ["bin", "dist", "tmp", "vendor", "testdata"]
exclude_regex = ["_test\\.go$"]
include_ext = ["go"]
kill_delay = "200ms"
log = "tmp/build-errors.log"
send_interrupt = true
stop_on_error = true

[log]
time = true

[screen]
clear_on_rebuild = true
